<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verso Editor — Bubble Menu</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <h1 class="demo-title">Verso Editor — Bubble Menu</h1>
      <div class="demo-controls">
        <div class="control-group">
          <label class="control-label">Locale</label>
          <select id="locale-select">
            <option value="en">English</option>
            <option value="zh-TW" selected>繁體中文</option>
          </select>
        </div>
        <div class="control-group">
          <label class="control-label">Theme</label>
          <select id="theme-select">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <span id="locale-status" class="locale-status"></span>
        <nav class="demo-nav">
          <a href="./index.html">Fixed Toolbar Demo</a>
        </nav>
      </div>
      <p class="demo-hint">選取文字後會出現懸浮工具列</p>
      <div id="editor"></div>
    </div>
    <script type="module" src="./src/main-bubble.ts"></script>
  </body>
</html>
